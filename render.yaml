services:
  - type: web
    name: revolt-backend
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: 'false'
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
